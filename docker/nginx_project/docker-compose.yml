services:

  app:
    build: ./app
    container_name: app

    restart: unless-stopped

    expose:
      - "5000"

    read_only: true

    tmpfs:
      - /tmp

    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      proxy_net:
        ipv4_address: 10.55.0.100

  nginx1:
    image: nginx:1.27-alpine
    container_name: nginx1

    restart: unless-stopped

    ports:
      - "8081:80"

    volumes:
      - ./nginx1/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx1:/var/log/nginx

    security_opt:
      - no-new-privileges:true

    depends_on:
      app:
        condition: service_healthy
      nginx2:
        condition: service_started
      nginx3:
        condition: service_started

    networks:
      proxy_net:
        ipv4_address: 10.55.0.10

  nginx2:
    image: nginx:1.27-alpine
    container_name: nginx2

    restart: unless-stopped

    ports:
      - "8082:80"

    volumes:
      - ./nginx2/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx2:/var/log/nginx

    security_opt:
      - no-new-privileges:true

    depends_on:
      app:
        condition: service_healthy
      nginx3:
        condition: service_started

    networks:
      proxy_net:
        ipv4_address: 10.55.0.11

  nginx3:
    image: nginx:1.27-alpine
    container_name: nginx3

    restart: unless-stopped

    ports:
      - "8083:80"

    volumes:
      - ./nginx3/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx3:/var/log/nginx

    security_opt:
      - no-new-privileges:true

    depends_on:
      app:
        condition: service_healthy

    networks:
      proxy_net:
        ipv4_address: 10.55.0.12

networks:
  proxy_net:
    driver: bridge

    ipam:
      config:
        - subnet: 10.55.0.0/16