# example file
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.django.appName | default "django-app" }}-service
  labels:
    app: django-app
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: django-app