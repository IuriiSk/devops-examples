# Helm example
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.django.appName | default "django-app" }}
  labels:
    app: django-app
    version: {{ .Values.image.tag }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: django-app
  template:
    metadata:
      labels:
        app: django-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: django
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: SECRET_KEY
          value: {{ .Values.django.secretKey | quote }}
        - name: DEBUG
          value: {{ .Values.django.debug | quote }}
        - name: DATABASE_URL
          value: "mysql://{{ .Values.mysql.user }}:{{ .Values.mysql.password }}@{{ .Release.Name }}-mysql:3306/{{ .Values.mysql.database }}"
        - name: REDIS_URL
          value: "redis://{{ .Release.Name }}-redis:{{ .Values.redis.port }}/0"
        {{- with .Values.extraEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /health/
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready/
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5