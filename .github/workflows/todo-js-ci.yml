name: todo-js CI

on:
  push:
    paths:
      - "examples/todo-js/**"
  pull_request:
    paths:
      - "examples/todo-js/**"

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: examples/todo-js/app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Basic run check
        run: node server.js &
  
  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t todo-js-app ./examples/todo-js/app