name: Full Monorepo CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:

# =========================
# 1. docker-site (compose)
# =========================
  docker-site:
    runs-on: ubuntu-latest

    if: |
      contains(github.event.head_commit.modified, 'examples/docker-site') ||
      contains(github.event.head_commit.modified, 'examples/docker-site/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start services
        run: |
          cd examples/docker-site
          docker compose up -d --build

      - name: Wait for app
        run: |
          cd examples/docker-site

          for i in {1..15}; do
            curl -s http://localhost:8080 && exit 0
            echo "Waiting..."
            sleep 3
          done

          echo "App failed"
          docker compose logs
          exit 1

      - name: Cleanup
        if: always()
        run: |
          cd examples/docker-site
          docker compose down -v || true


# =========================
# 2. todo-devops (compose + healthcheck)
# =========================
  todo-devops:
    runs-on: ubuntu-latest

    if: |
      contains(github.event.head_commit.modified, 'examples/todo-devops')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start services
        run: |
          cd examples/todo-devops
          docker compose up -d --build

      - name: Wait for service
        run: |
          cd examples/todo-devops

          for i in {1..20}; do
            curl -f http://localhost:5010/health && exit 0
            echo "waiting..."
            sleep 3
          done

          echo "Service failed"
          docker compose logs
          exit 1

      - name: Cleanup
        if: always()
        run: |
          cd examples/todo-devops
          docker compose down -v || true


# =========================
# 3. todo-js (node + docker)
# =========================
  todo-js:
    runs-on: ubuntu-latest

    if: |
      contains(github.event.head_commit.modified, 'examples/todo-js')

    defaults:
      run:
        working-directory: examples/todo-js/app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Basic run check
        run: node server.js &

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t todo-js-app ./


# =========================
# 4. task-processor (matrix v1 + v2)
# =========================
  task-processor:
    runs-on: ubuntu-latest

    if: |
      contains(github.event.head_commit.modified, 'projects/task-processor') ||
      contains(github.event.head_commit.modified, 'projects/task-processor-v1')

    strategy:
      matrix:
        service:
          - task-processor
          - task-processor-v1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ${{ matrix.service }}:latest ./projects/${{ matrix.service }}

      - name: Run container (smoke test)
        run: |
          docker run -d -p 3001:3001 --name app ${{ matrix.service }}:latest
          sleep 5
          curl --fail http://localhost:3001 || exit 1
          docker logs app
          docker stop app