name: Full Monorepo CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:

# =========================
# docker-site
# =========================
  docker-site:
    runs-on: ubuntu-latest

    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Check changed files
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            changed:
              - 'examples/docker-site/**'

      - name: Skip if not changed
        if: steps.filter.outputs.changed != 'true'
        run: echo "No changes in docker-site" && exit 0

      - name: Start services
        if: steps.filter.outputs.changed == 'true'
        run: |
          cd examples/docker-site
          docker compose up -d --build

      - name: Test app
        if: steps.filter.outputs.changed == 'true'
        run: |
          cd examples/docker-site

          for i in {1..15}; do
            curl -s http://localhost:8080 && exit 0
            sleep 3
          done

          docker compose logs
          exit 1

      - name: Cleanup
        if: always()
        run: |
          cd examples/docker-site
          docker compose down -v || true