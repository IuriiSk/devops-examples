name: Full Monorepo CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:

# =========================
# docker-site (compose)
# =========================
  docker-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start services
        run: |
          cd examples/docker-site
          docker compose up -d --build

      - name: Wait for app
        run: |
          cd examples/docker-site

          for i in {1..15}; do
            curl -s http://localhost:8080 && exit 0
            echo "waiting..."
            sleep 3
          done

          docker compose logs
          exit 1

      - name: Cleanup
        if: always()
        run: |
          cd examples/docker-site
          docker compose down -v || true


# =========================
# todo-js (Node + Docker)
# =========================
  todo-js:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd examples/todo-js/app
          npm install

      - name: Run app
        run: |
          cd examples/todo-js/app
          node server.js &

      - name: Build Docker image
        run: |
          docker build -t todo-js-app ./examples/todo-js/app


# =========================
# todo-devops (compose + healthcheck)
# =========================
  todo-devops:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: |
          cd examples/todo-devops
          docker compose up -d --build

      - name: Wait for service
        run: |
          cd examples/todo-devops

          for i in {1..20}; do
            curl -f http://localhost:5010/health && exit 0
            echo "waiting..."
            sleep 3
          done

          docker compose logs
          exit 1

      - name: Cleanup
        if: always()
        run: |
          cd examples/todo-devops
          docker compose down -v || true


