name: Todo DevOps CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t todo-devops ./examples/todo-devops

      - name: Run container
        run: |
          docker run -d -p 5000:5000 --name todo-test todo-devops

      - name: Wait for service (stable health check)
        run: |
          for i in {1..10}; do
            curl -f http://localhost:5000/health && exit 0
            echo "waiting..."
            sleep 3
          done
          echo "Service failed"
          docker logs todo-test
          exit 1

      - name: Cleanup
        if: always()
        run: |
          docker rm -f todo-test || true