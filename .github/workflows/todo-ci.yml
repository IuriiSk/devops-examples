name: Todo DevOps CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start services (Docker Compose)
        run: |
          docker compose -f ./examples/todo-devops/docker-compose.yml up -d --build

      - name: Wait for health
        run: |
          for i in {1..20}; do
            curl -f http://localhost:5010/health && exit 0
            echo "waiting..."
            sleep 3
          done

          echo "Service failed"
          docker compose logs
          exit 1

      - name: Cleanup
        if: always()
        run: |
          docker compose -f ./examples/todo-devops/docker-compose.yml down || true