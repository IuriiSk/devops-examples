name: docker-db-test CI

on:
  push:
    branches: [ "main" ]
    paths:
      - "examples/docker-db-test/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - "examples/docker-db-test/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start services
        run: |
          cd examples/docker-db-test
          docker compose up -d --build

      - name: Wait for app
        run: |
          cd examples/docker-db-test

          for i in {1..15}; do
            curl -s http://localhost:8080 && exit 0
            echo "Waiting..."
            sleep 3
          done

          echo "App failed"
          docker compose logs
          exit 1

      - name: Cleanup
        if: always()
        run: |
          cd examples/docker-site
          docker compose down -v || true