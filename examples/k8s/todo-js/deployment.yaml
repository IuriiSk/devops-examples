apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-js
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-js
  template:
    metadata:
      labels:
        app: todo-js
    spec:
      containers:
        - name: todo-js
          image: your-dockerhub/todo-js:latest
          ports:
            - containerPort: 3000
          env:
            - name: DB_HOST
              value: postgres